<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Mother’s Day 💐</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(pink, #fff);
      text-align: center;
      padding: 40px;
    }

    .card {
      background: white;
      max-width: 550px;
      margin: auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      color: hotpink;
      margin-bottom: 10px;
    }

    h2 {
      color: #d1006c;
      margin-top: 25px;
    }

    p {
      color: #333;
      font-size: 16px;
      line-height: 1.5;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 15px;
    }

    button {
      margin-top: 25px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: hotpink;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #message {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
      color: #d1006c;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>Happy Mother’s Day ❤️</h1>

    <p>
      Thank you for everything you do for our family. We appreciate you more than words can say.
      You are the heart of everything we do.
    </p>

    <h2>Our Memories ❤️</h2>

    <!-- COLLAGE IMAGE -->
    <img src="Fam.jpg" alt="Family collage">

    <button onclick="showMessage()">Click for a surprise</button>

    <p id="message"></p>

  </div>

  <script>
    function showMessage() {
      document.getElementById("message").innerText =
        "We love you so much, Mom 💕 Thank you for always being there for us.";
    }
  </script>

</body>
</html>
